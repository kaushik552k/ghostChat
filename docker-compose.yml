services:
  redis:
    image: redis:7-alpine
    container_name: blink-redis
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    restart: unless-stopped
    networks:
      - blink-net

  backend:
    build: ./backend
    container_name: blink-backend
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PORT=4000
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - blink-net

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_SOCKET_URL: https://chat.kaushikcodes.in
    container_name: blink-frontend
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - blink-net

  # nginx:
  #   image: nginx:alpine
  #   container_name: blink-gateway
  #   ports:
  #     - "8080:80"
  #     - "8443:443"
  #   volumes:
  #     - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
  #     - /etc/letsencrypt:/etc/letsencrypt:ro
  #   depends_on:
  #     - frontend
  #     - backend
  #   restart: unless-stopped
